# Virtual display — name may vary by VM backend:
#   virtio-vga / QXL → Virtual-1
#   Hyprland headless → HEADLESS-1
monitor = Virtual-1, 3840x2160@60, 0x0, 2.0

input {
    kb_layout = de
    kb_variant = nodeadkeys
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

workspace = 1, monitor:Virtual-1, persistent:true
workspace = 2, monitor:Virtual-1, persistent:true
workspace = 3, monitor:Virtual-1, persistent:true
workspace = 4, monitor:Virtual-1, persistent:true

workspace = special:games, monitor:Virtual-1
