# Two 4K displays via DisplayPort
# DP-1 left (0x0), DP-2 right (2560x0)
# Logical offset = physical width / scale → 3840 / 1.5 = 2560
monitor = DP-1, 3840x2160@60, 0x0, 1.5
monitor = DP-2, 3840x2160@60, 2560x0, 1.5

input {
    kb_layout = de
    kb_variant = nodeadkeys
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# Odd workspaces on left monitor, even on right
workspace = 1, monitor:DP-1, persistent:true
workspace = 2, monitor:DP-2, persistent:true
workspace = 3, monitor:DP-1, persistent:true
workspace = 4, monitor:DP-2, persistent:true
workspace = 5, monitor:DP-1, persistent:true
workspace = 6, monitor:DP-2, persistent:true

workspace = special:games, monitor:DP-1
